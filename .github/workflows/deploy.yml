name: Build and deploy

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      DISCORD_BOT_HOSTS: ${{ secrets.DISCORD_BOT_HOSTS }}
      DISCORD_BOT_SSH_USER: ${{ secrets.DISCORD_BOT_SSH_USER }}
      DISCORD_BOT_SSH_PORT: ${{ secrets.DISCORD_BOT_SSH_PORT }}
      DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
      YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
      YOUTUBE_OAUTH_INIT: ${{ secrets.YOUTUBE_OAUTH_INIT }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build
        run: |
          chmod +x ./gradlew
          ./gradlew clean build

      - name: Configure SSH
        id: ssh
        env:
          SSH_PRIVATE_KEY: ${{ secrets.DISCORD_BOT_SSH_KEY }}
        run: |
          if [ -z "$SSH_PRIVATE_KEY" ]; then
            echo "::warning::DISCORD_BOT_SSH_KEY is not configured; skipping deploy."
            echo "skip_deploy=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ -z "$DISCORD_TOKEN" ]; then
            echo "::warning::DISCORD_TOKEN is not configured; skipping deploy."
            echo "skip_deploy=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          hosts="${DISCORD_BOT_HOSTS:-147.182.178.32}"
          port="${DISCORD_BOT_SSH_PORT:-22}"
          IFS=',' read -ra host_list <<< "$hosts"
          for host in "${host_list[@]}"; do
            host="$(echo "$host" | xargs)"
            [ -n "$host" ] || continue
            ssh-keyscan -p "$port" "$host" >> ~/.ssh/known_hosts
          done

      - name: Deploy
        if: steps.ssh.outputs.skip_deploy != 'true'
        run: bash scripts/deploy.sh
